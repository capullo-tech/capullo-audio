# jitpack builds & publishes only the library module (the :app harness is dev-only).
# Resolves contracts from jitpack (com.github.capullo-tech:capullo-audio-contracts) and
# lib-snapcast-android from jitpack; needs the Android SDK, which jitpack provides.
jdk:
  - openjdk17
install:
  - ./gradlew :capullo-audio:publishToMavenLocal -x test -x lint
