name: Release

on:
  push:
    tags:
      - 'v*' # e.g. v1.0.0 - cut a library release

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
      # capullo-audio is a MULTI-MODULE jitpack repo: the engine (module == repo name) and
      # capullo-audio-ui are both served under the NESTED group com.github.capullo-tech.capullo-audio.
      # Warm BOTH so a consumer re-pinning to this tag doesn't 401/wait on either. Best-effort.
      - name: Warm jitpack builds for the tag (both modules, best-effort)
        run: |
          tag="${{ github.ref_name }}"
          base="https://jitpack.io/com/github/capullo-tech/capullo-audio"
          for mod in capullo-audio capullo-audio-ui; do
            curl -sSf --max-time 300 "${base}/${mod}/${tag}/${mod}-${tag}.pom" -o /dev/null \
              || echo "jitpack warm for ${mod} did not complete; jitpack still builds on first request."
          done
